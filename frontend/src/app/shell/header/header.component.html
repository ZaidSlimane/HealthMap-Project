<header class="app-header">
  <button class="hamburger-btn" (click)="toggleSidebar.emit()" title="Ouvrir/Fermer le menu">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Institution brand -->
  <div class="topbar-brand">
    <mat-icon class="topbar-brand-icon">domain</mat-icon>
    <div class="topbar-brand-text">
      <span class="topbar-brand-name">{{ auth.currentUser()?.establishment?.name || 'HealthMap' }}</span>
      <span class="topbar-brand-sep">·</span>
      <span class="topbar-brand-city">{{ auth.currentUser()?.establishment?.province?.name || '' }}</span>
    </div>
  </div>

  <button class="search-btn">
    <mat-icon>search</mat-icon>
    <span>Rechercher...</span>
  </button>

  <div class="header-spacer"></div>

  <span class="header-clock">{{ currentTime }}</span>

  <!-- Single notification bell with live count -->
  <button class="notif-btn" title="Notifications — demandes et résultats en attente">
    <mat-icon>notifications</mat-icon>
    @if (notifs.counts().total > 0) {
      <span class="notif-badge">{{ notifs.counts().total > 99 ? '99+' : notifs.counts().total }}</span>
    }
  </button>

  <div class="user-section">
    <div class="user-avatar">{{ userInitial() }}</div>
    <span class="username-chip">{{ displayName() }}</span>
    <button class="logout-btn" (click)="logout()" title="Déconnexion">
      <mat-icon>logout</mat-icon>
    </button>
  </div>
</header>
