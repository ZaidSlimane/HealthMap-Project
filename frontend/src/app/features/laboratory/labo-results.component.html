<div class="page-container page-fade-in">
  <div class="page-heading">
    <mat-icon class="heading-icon">science</mat-icon>
    <h2 class="section-title">Résultat biologique</h2>
  </div>

  <div class="card-surface">
    <div class="sub-header">
      <div class="sub-title">
        <mat-icon>group</mat-icon>
        <h3>Liste des patients</h3>
      </div>
      <div class="header-controls">
        <div class="barcode-input">
          <mat-icon>qr_code_scanner</mat-icon>
          <input [(ngModel)]="searchTerm" placeholder="Scanner le code à barre..." class="barcode-field" data-testid="input-barcode">
          <button mat-icon-button><mat-icon>search</mat-icon></button>
        </div>
        <div class="view-toggle">
          <button mat-icon-button [class.active-view]="viewMode==='list'" (click)="viewMode='list'"><mat-icon>table_rows</mat-icon></button>
          <button mat-icon-button [class.active-view]="viewMode==='grid'" (click)="viewMode='grid'"><mat-icon>grid_view</mat-icon></button>
        </div>
      </div>
    </div>

    <table mat-table [dataSource]="filtered">
      <ng-container matColumnDef="admissionNumber">
        <th mat-header-cell *matHeaderCellDef>N° Admission</th>
        <td mat-cell *matCellDef="let row">{{ row.admissionNumber }}</td>
      </ng-container>
      <ng-container matColumnDef="patient">
        <th mat-header-cell *matHeaderCellDef>Patient</th>
        <td mat-cell *matCellDef="let row">{{ row.patientName }}</td>
      </ng-container>
      <ng-container matColumnDef="service">
        <th mat-header-cell *matHeaderCellDef>Service</th>
        <td mat-cell *matCellDef="let row">{{ row.service }}</td>
      </ng-container>
      <ng-container matColumnDef="medecin">
        <th mat-header-cell *matHeaderCellDef>Médecin</th>
        <td mat-cell *matCellDef="let row">{{ row.medecin }}</td>
      </ng-container>
      <ng-container matColumnDef="dateRequest">
        <th mat-header-cell *matHeaderCellDef>Date de la demande</th>
        <td mat-cell *matCellDef="let row">{{ row.dateRequest }}</td>
      </ng-container>
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Action</th>
        <td mat-cell *matCellDef="let row">
          <button mat-flat-button class="btn-saisie" data-testid="button-saisie">
            <mat-icon>edit</mat-icon> Saisie
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
