<div class="page-container page-fade-in">
  <div class="queue-layout">
    <!-- LEFT: Current patient card -->
    <div class="current-patient-card card-surface">
      <div class="patient-name">{{ patient?.fullName }}</div>
      <div class="patient-dob">{{ patient?.dob }}</div>
      <div class="queue-number"># {{ patient?.queueNumber }}</div>

      <button mat-flat-button class="btn-start" data-testid="btn-start-consultation">
        Démarrer La consultation
      </button>
      <button mat-flat-button class="btn-recall" data-testid="btn-recall">
        <mat-icon>phone</mat-icon> Rappeler le patient
      </button>
      <button mat-flat-button class="btn-absent" data-testid="btn-absent">
        <mat-icon>person_off</mat-icon> Patient absent
      </button>

      <div class="history-section">
        <div class="history-header" (click)="historyExpanded = !historyExpanded">
          <mat-icon class="history-icon">history</mat-icon>
          <span>Histotique des consultations</span>
          <button mat-icon-button>
            <mat-icon>{{ historyExpanded ? 'remove' : 'add' }}</mat-icon>
          </button>
          <button mat-icon-button>
            <mat-icon>close</mat-icon>
          </button>
        </div>
        @if (historyExpanded) {
          <div class="history-body">
            <p class="text-muted">Aucune consultation antérieure.</p>
          </div>
        }
      </div>
    </div>

    <!-- RIGHT: Waiting list -->
    <div class="waiting-list-panel card-surface">
      <h3 class="panel-title">Liste d'attente</h3>
      <div class="waiting-items">
        @for (item of queueList; track item.number) {
          <div class="waiting-item">
            <span class="queue-num">{{ item.number }}</span>
            <span class="queue-service" dir="rtl">{{ item.service }}</span>
            <mat-icon class="call-icon">phone</mat-icon>
          </div>
        }
      </div>
    </div>
  </div>
</div>
