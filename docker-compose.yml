services:
  # ─── PHP-FPM (Laravel backend) ─────────────────────────────────────
  app:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: healthmap_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./Backend:/var/www
      - ./Backend/storage/app:/var/www/storage/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ml:
        condition: service_started
    networks:
      - healthmap_network

  # ─── ML Service (bed occupancy prediction) ─────────────────────────
  ml:
    build: ./ml
    container_name: healthmap_ml
    restart: unless-stopped
    networks:
      - healthmap_network

  # ─── Backend Nginx (FastCGI proxy to PHP-FPM) ──────────────────────
  nginx_backend:
    image: nginx:1.25-alpine
    container_name: healthmap_nginx_backend
    restart: unless-stopped
    volumes:
      - ./Backend:/var/www
      - ./Backend/docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - healthmap_network

  # ─── Frontend (Angular SPA + reverse proxy to backend) ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthmap_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - nginx_backend
    networks:
      - healthmap_network

  # ─── Laravel Reverb WebSocket server ───────────────────────────────
  # Uses the BUILT image (no host volume mount) so vendor/ is the one
  # built by composer install in the Dockerfile — no stale autoload issue.
  reverb:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: healthmap_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - healthmap_network

  # ─── Queue worker (processes broadcast jobs from Redis) ────────────
  # Same: uses the built image without host volume mount for vendor.
  queue:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: healthmap_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=30
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - healthmap_network

  # ─── Redis (real-time transport + queue layer) ───────────────────────
  redis:
    image: redis:7-alpine
    container_name: healthmap_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - healthmap_network

  # ─── MySQL Database ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: healthmap_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthmap_network

networks:
  healthmap_network:
    driver: bridge

volumes:
  db_data:
