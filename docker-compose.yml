services:
  # ─── PHP-FPM (Laravel backend) ─────────────────────────────────────
  app:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: healthmap_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./Backend:/var/www
      - ./Backend/storage/app:/var/www/storage/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - healthmap_network

  # ─── Backend Nginx (FastCGI proxy to PHP-FPM) ──────────────────────
  nginx_backend:
    image: nginx:1.25-alpine
    container_name: healthmap_nginx_backend
    restart: unless-stopped
    volumes:
      - ./Backend:/var/www
      - ./Backend/docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - healthmap_network

  # ─── Frontend (Angular SPA + reverse proxy to backend) ──────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: healthmap_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - nginx_backend
    networks:
      - healthmap_network

  # ─── MySQL Database ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: healthmap_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthmap_network

networks:
  healthmap_network:
    driver: bridge

volumes:
  db_data:
